name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Run test suite
        run: bundle exec rspec

      - name: Run RuboCop
        run: bundle exec rubocop

      - name: Publish gem
        uses: rubygems/release-gem@v1
